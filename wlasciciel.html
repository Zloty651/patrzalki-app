<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrzałki - Panel Właściciela</title>
    <style>
        body {
            background-color: #050522; /* Bardzo ciemny granat */
            color: #00ebff; /* Cyjanowy tekst hakerski */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 30px;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .admin-box {
            border: 2px solid #28a745;
            background-color: rgba(40, 167, 69, 0.05);
            border-radius: 8px;
            padding: 25px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.3);
            box-sizing: border-box;
        }
        h1 { color: #28a745; text-align: center; font-size: 24px; margin-top: 0; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 235, 255, 0.1);
            font-size: 14px;
        }
        .info-value { color: #ffffff; font-weight: bold; }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 25px;
        }
        .back-btn {
            display: block;
            text-align: center;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            transition: background 0.3s;
        }
        .back-btn:hover { background-color: #218838; }
        .fake-destroy-btn {
            display: block;
            text-align: center;
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            transition: background 0.3s;
        }
        .fake-destroy-btn:hover { background-color: #bd2130; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h1>🔒 PANEL WŁAŚCICIELA: PATRZAŁKI CORE</h1>
        
        <div class="info-row">
            <span>Status systemu:</span>
            <span class="info-value">PEŁNA AUTORYZACJA (ADMIN)</span>
        </div>
        <div class="info-row">
            <span>Poziom zabezpieczeń trasy:</span>
            <span class="info-value">AKTYWNY (SYSTEM LABIRYNTÓW)</span>
        </div>
        <div class="info-row">
            <span>Weryfikacja właściciela:</span>
            <span class="info-value">ZLOTY651</span>
        </div>
        <div class="info-row">
            <span>Silnik językowy modułu AI:</span>
            <span class="info-value">Meta Llama 3</span>
        </div>

        <div class="btn-group">
            <!-- Przycisk, który automatycznie otwiera główną stronę z Twoim tajnym kluczem -->
            <button class="back-btn" onclick="launchAsOwner()">Uruchom aplikację jako Właściciel</button>
            
            <!-- Przycisk pułapka do straszenia intruzów -->
            <button class="fake-destroy-btn" onclick="triggerFakeProtocol()">⚠️ URUCHOM PROTOKÓŁ AUTODESTRUKCJI LOGÓW</button>
        </div>
    </div>

    <script>
        function launchAsOwner() {
            // Skrypt automatycznie wykrywa adres Twojej strony i dopisuje do niego Twój tajny klucz właściciela key=d3027b4b
            const mainPageUrl = window.location.href.replace('wlasciciel.html', '') + '?key=d3027b4b';
            window.open(mainPageUrl, '_blank');
        }

        function triggerFakeProtocol() {
            alert("⚠️ PROTOKÓŁ LOCKDOWN AKTYWOWANY!\n\nCzyszczenie logów sieciowych systemu Patrzałki...\nUsuwanie bazy danych z folderu głównego...\nZamykanie sesji administratora.");
            window.location.href = "google.com"; // Wyrzuca intruza na Google
        }
    </script>

</body>
</html>
